<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

  <head th:replace="/fragments/head :: head">

<body class="sub_page">

  <div class="hero_area">
    <div class="bg-box">
      <img th:src="@{/resources/static/images/nav-bg.jpg}" alt="">
    </div>
    <header th:replace="/fragments/header :: header">
  </div>
<!-- book section -->
		<section class="book_section layout_padding">
			<div class="container">
				<div class="heading_container">
					<h4>Profile</h4>
          <img th:src="${photo + '?t=' + timestamp}" class="rounded-circle" style="width: 150px; float: left; padding: 10px 10px 10px 10px;" alt="Avatar"/>
					<p th:text="${error}" th:if="${error ne null}" class="alert alert-danger"></p>
					<form method="post" th:action="@{/update_photo}" enctype="multipart/form-data">
						<div class="form-group">
							<input type="file" name="file" class="form-control-file"/>
						</div>
						<button type="submit" class="btn btn-primary">Update photo</button>
					</form>
				</div>
				<div class="row">
					<div class="col-md-6">
						<div class="form_container">
							<form
								action="#"
								th:action="@{/profile}"
								th:object="${account}"
								method="post"
							>
								<div>
									<input type="hidden" id="id" name="id" th:field="*{id}"/>
									<input
										id="email"
										name="email"
										type="email"
										th:field="*{email}"
										class="form-control"
										placeholder="Email"
										required
									/>
									<p
										th:if="${#fields.hasErrors('email')}"
										class="alert alert-danger"
										role="alert"
										th:errors="*{email}"
									>
										Email Error
									</p>
								</div>
								<div>
									<input
										id="password"
										type="password"
										th:field="*{password}"
										class="form-control"
										placeholder="Password"
										required
									/>
									<p
										th:if="${#fields.hasErrors('password')}"
										class="alert alert-danger"
										role="alert"
										th:errors="*{password}"
									>
										password Error
									</p>
								</div>
								<div>
									<input
										id="firstname"
										type="text"
										th:field="*{firstname}"
										class="form-control"
										placeholder="First name"
										required
									/>
									<p
										th:if="${#fields.hasErrors('firstname')}"
										class="alert alert-danger"
										role="alert"
										th:errors="*{firstname}"
									>
										firstname Error
									</p>
								</div>
								<div>
									<input
										id="lastname"
										type="text"
										th:field="*{lastname}"
										class="form-control"
										placeholder="Last name"
										required
									/>
									<p
										th:if="${#fields.hasErrors('lastname')}"
										class="alert alert-danger"
										role="alert"
										th:errors="*{lastname}"
									>
										lastname Error
									</p>
								</div>
								<div>
									<input
										id="age"
										type="number"
										th:field="*{age}"
										class="form-control"
										placeholder="Age"
										required
									/>
									<p
										th:if="${#fields.hasErrors('age')}"
										class="alert alert-danger"
										role="alert"
										th:errors="*{age}"
									>
										Age Error
									</p>
								</div>
								<div>
									<input
										id="date_of_birth"
										type="date"
										th:field="*{date_of_birth}"
										class="form-control"
										placeholder="Date of birth"
										required
									/>
									<p
										th:if="${#fields.hasErrors('date_of_birth')}"
										th:errors="*{date_of_birth}"
										class="alert alert-danger"
										role="alert"
									>
										date_of_birth Error
									</p>
								</div>
								<div>
									<select
										id="gender"
										name="gender"
										th:field="*{gender}"
										class="form-control"
									>
										<option value="Male">Male</option>
										<option value="Female">Female</option>
										<option value="Others">Others</option>
									</select>
									<p
										th:if="${#fields.hasErrors('gender')}"
										class="alert alert-danger"
										role="alert"
										th:errors="*{gender}"
									>
										Gender Error
									</p>
								</div>

								<div class="btn_box">
									<button
										class="btn rounded-pill px-4 py-2"
										style="
											background-color: #f5c842;
											color: white;
											border: none;
										"
										type="submit"
									>
										Update Profile
									</button>
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>
		</section>
		<!-- end book section -->
  <footer th:replace="/fragments/footer :: footer">
</body>

</html>
